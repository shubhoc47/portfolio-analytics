# Alembic configuration file.
#
# This file is read by Alembic at runtime.
# The actual database URL is loaded dynamically in alembic/env.py
# from the app settings (which reads from .env / environment variables).

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template used when generating new migration scripts
# (uses the default Mako template in alembic/script.py.mako)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Prepend sys.path so alembic can find the app package
prepend_sys_path = .

# Timezone for migration file timestamps (UTC recommended)
timezone = UTC

# Truncate the "slug" field in migration file names
truncate_slug_length = 40

# Set to 'true' to run in offline mode (generates SQL scripts without DB connection)
# Usually we use online mode (the default), which connects and applies changes directly
# offline_mode = false

# Database URL placeholder (overridden at runtime in env.py)
# Do NOT put real credentials here; use environment variables instead.
sqlalchemy.url = driver://user:pass@localhost/dbname

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
